<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading – Greek Tutorial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .page-header {
            max-width: 680px;
            margin: 0 auto 36px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #333;
            letter-spacing: 0.02em;
        }

        .items-list {
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            text-decoration: none;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: box-shadow 0.18s, transform 0.18s;
            cursor: pointer;
        }

        .item-card:hover {
            box-shadow: 0 4px 16px rgba(79,70,229,0.13);
            transform: translateY(-2px);
        }

        .item-card-static {
            cursor: default;
        }

        .item-card-static:hover {
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            transform: none;
        }

        .item-name {
            font-size: 1rem;
            font-weight: 500;
            flex: 1;
            text-align: left;
        }

        .item-level {
            font-size: 0.75rem;
            font-weight: 600;
            color: #4f46e5;
            background: #ede9fe;
            border-radius: 6px;
            padding: 2px 10px;
            letter-spacing: 0.04em;
            flex-shrink: 0;
            margin-right: 16px;
            text-transform: uppercase;
        }

        .item-arrow {
            color: #4f46e5;
            font-size: 1.1rem;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.3rem;
            }

            .item-card {
                padding: 18px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>Reading</h1>
    </div>

    <div class="items-list" id="itemsList">
        <div class="item-card item-card-static">
            <span class="item-name">Loading items...</span>
        </div>
    </div>

    <script>
        const itemsList = document.getElementById('itemsList');

        fetch('../content/reading/items.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Unable to load items (${response.status})`);
                }
                return response.json();
            })
            .then(data => {
                const items = Array.isArray(data.items) ? data.items : [];
                renderItems(items);
            })
            .catch(() => {
                renderMessage('Unable to load reading items.');
            });

        function renderItems(items) {
            if (!items.length) {
                renderMessage('No reading items available yet.');
                return;
            }

            itemsList.textContent = '';

            items.forEach(item => {
                const link = document.createElement('a');
                link.className = 'item-card';
                link.href = `item.html?id=${encodeURIComponent(item.id)}`;
                link.innerHTML = `
                    <span class="item-level">${item.level}</span>
                    <span class="item-name">${item.caption}</span>
                    <span class="item-arrow">→</span>
                `;
                itemsList.appendChild(link);
            });
        }

        function renderMessage(message) {
            itemsList.innerHTML = '';

            const card = document.createElement('div');
            card.className = 'item-card item-card-static';

            const text = document.createElement('span');
            text.className = 'item-name';
            text.textContent = message;

            card.appendChild(text);
            itemsList.appendChild(card);
        }
    </script>
</body>
</html>
