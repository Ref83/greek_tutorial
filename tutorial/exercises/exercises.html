<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek Grammar Exercises</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            padding: 40px 20px;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 36px;
            color: #333;
            letter-spacing: 0.02em;
        }

        .exercises-list {
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .exercise-card {
            background: #fff;
            border-radius: 12px;
            padding: 28px 32px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .exercise-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .exercise-number {
            font-size: 0.85rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .exercise-type-badge {
            font-size: 0.75rem;
            font-weight: 600;
            background: #eef2ff;
            color: #4f46e5;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.03em;
        }

        .exercise-question {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 22px;
            line-height: 1.6;
            color: #111;
        }

        .question-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 22px;
        }

        .question-row .exercise-question {
            margin-bottom: 0;
            flex: 1;
        }

        .translation-toggle {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #a5b4fc;
            background: none;
            color: #4f46e5;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 3px;
            transition: background 0.15s, color 0.15s;
        }

        .translation-toggle:hover {
            background: #eef2ff;
        }

        .translation-bubble {
            display: none;
            font-size: 0.88rem;
            color: #555;
            background: #f5f3ff;
            border-left: 3px solid #a5b4fc;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 18px;
            font-style: italic;
        }

        .translation-bubble.visible {
            display: block;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: #fafafa;
            cursor: pointer;
            font-size: 1rem;
            font-family: inherit;
            color: #1a1a1a;
            text-align: left;
            transition: border-color 0.15s, background 0.15s;
            width: 100%;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #a5b4fc;
            background: #f5f3ff;
        }

        .option-key {
            font-weight: 700;
            font-size: 0.9rem;
            color: #6b7280;
            width: 22px;
            flex-shrink: 0;
            text-transform: uppercase;
        }

        .option-btn.correct {
            border-color: #22c55e;
            background: #f0fdf4;
        }

        .option-btn.correct .option-key {
            color: #16a34a;
        }

        .option-btn.wrong {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .option-btn.wrong .option-key {
            color: #dc2626;
        }

        .option-btn:disabled {
            cursor: default;
        }

        .result-message {
            margin-top: 16px;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 10px 16px;
            border-radius: 8px;
            display: none;
        }

        .result-message.correct {
            background: #f0fdf4;
            color: #15803d;
            display: block;
        }

        .result-message.wrong {
            background: #fef2f2;
            color: #b91c1c;
            display: block;
        }

        .file-picker-wrapper {
            max-width: 680px;
            margin: 0 auto 32px;
            display: flex;
            align-items: center;
            gap: 14px;
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .file-picker-label {
            font-size: 0.9rem;
            color: #555;
            white-space: nowrap;
        }

        #file-input {
            flex: 1;
            font-size: 0.9rem;
            font-family: inherit;
            color: #333;
            cursor: pointer;
        }

        .stats-bar {
            max-width: 680px;
            margin: 0 auto 24px;
            display: none;
            align-items: center;
            gap: 16px;
            background: #fff;
            border-radius: 12px;
            padding: 16px 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .stats-bar.visible {
            display: flex;
        }

        .stats-label {
            font-size: 0.9rem;
            color: #555;
        }

        .stats-score {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .stats-progress {
            flex: 1;
            height: 8px;
            background: #e5e7eb;
            border-radius: 99px;
            overflow: hidden;
        }

        .stats-progress-fill {
            height: 100%;
            background: #22c55e;
            border-radius: 99px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .export-btn {
            display: none;
            margin: 0 auto 32px;
            max-width: 680px;
            width: 100%;
            padding: 12px 20px;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .export-btn:hover {
            background: #4338ca;
        }

        .export-btn.visible {
            display: block;
        }

        .fill-form {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .fill-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 1rem;
            font-family: inherit;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: #fafafa;
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.15s;
        }

        .fill-input:focus {
            border-color: #a5b4fc;
        }

        .fill-input.correct {
            border-color: #22c55e;
            background: #f0fdf4;
        }

        .fill-input.wrong {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .fill-submit {
            padding: 12px 22px;
            background: #4f46e5;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .fill-submit:hover:not(:disabled) {
            background: #4338ca;
        }

        .fill-submit:disabled {
            background: #a5b4fc;
            cursor: default;
        }
    </style>
</head>
<body>
    <h1>Greek Grammar Exercises</h1>
    <div class="file-picker-wrapper">
        <span class="file-picker-label">Load exercises:</span>
        <input type="file" id="file-input" accept=".json">
    </div>
    <div class="stats-bar" id="stats-bar">
        <span class="stats-label">Score:</span>
        <span class="stats-score" id="stats-score">0 of 0</span>
        <div class="stats-progress">
            <div class="stats-progress-fill" id="stats-fill"></div>
        </div>
    </div>
    <button class="export-btn" id="export-btn">Export Statistics as JSON</button>
    <div class="exercises-list" id="exercises-list"></div>

    <script>
        const typeLabels = {
            select: 'Multiple Choice',
            fill: 'Fill in the Blank'
        };

        let stats = { correct: 0, answered: 0, total: 0, errors: [] };

        function updateStats(isCorrect, exerciseNumber, chosenKey) {
            stats.answered++;
            if (isCorrect) {
                stats.correct++;
            } else {
                stats.errors.push({ exercise: exerciseNumber, error: chosenKey });
            }
            document.getElementById('stats-score').textContent = `${stats.correct} of ${stats.total}`;
            const pct = stats.total > 0 ? (stats.correct / stats.total) * 100 : 0;
            document.getElementById('stats-fill').style.width = pct + '%';

            document.getElementById('export-btn').classList.add('visible');
        }

        document.getElementById('export-btn').addEventListener('click', () => {
            const output = {
                score: `${stats.correct} of ${stats.total}`,
                wrong_answers: stats.errors
            };
            const blob = new Blob([JSON.stringify(output, null, 4)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'statistics.json';
            a.click();
            URL.revokeObjectURL(a.href);
        });

        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    const container = document.getElementById('exercises-list');
                    container.innerHTML = '';
                    stats = { correct: 0, answered: 0, total: data.exercises.length, errors: [] };
                    document.getElementById('stats-score').textContent = `0 of ${stats.total}`;
                    document.getElementById('stats-fill').style.width = '0%';
                    document.getElementById('stats-bar').classList.add('visible');
                    document.getElementById('export-btn').classList.remove('visible');
                    renderExercises(data.exercises);
                } catch {
                    document.getElementById('exercises-list').textContent = 'Invalid JSON file.';
                }
            };
            reader.readAsText(file);
        });

        function renderExercises(exercises) {
            const container = document.getElementById('exercises-list');

            exercises.forEach((exercise) => {
                const card = document.createElement('div');
                card.className = 'exercise-card';

                const meta = document.createElement('div');
                meta.className = 'exercise-meta';

                const number = document.createElement('span');
                number.className = 'exercise-number';
                number.textContent = `Exercise ${exercise.number}`;

                const badge = document.createElement('span');
                badge.className = 'exercise-type-badge';
                badge.textContent = typeLabels[exercise.type] || exercise.type;

                meta.appendChild(number);
                meta.appendChild(badge);

                const questionRow = document.createElement('div');
                questionRow.className = 'question-row';

                const question = document.createElement('div');
                question.className = 'exercise-question';
                question.textContent = exercise.header;
                questionRow.appendChild(question);

                const translationBubble = document.createElement('div');
                translationBubble.className = 'translation-bubble';

                if (exercise.translations) {
                    const toggleBtn = document.createElement('button');
                    toggleBtn.className = 'translation-toggle';
                    toggleBtn.textContent = '?';
                    toggleBtn.title = 'Show translation';
                    translationBubble.textContent = exercise.translations;
                    toggleBtn.addEventListener('click', () => {
                        translationBubble.classList.toggle('visible');
                    });
                    questionRow.appendChild(toggleBtn);
                }

                const resultMsg = document.createElement('div');
                resultMsg.className = 'result-message';

                card.appendChild(meta);
                card.appendChild(questionRow);
                card.appendChild(translationBubble);

                if (exercise.type === 'select') {
                    const optionsList = document.createElement('div');
                    optionsList.className = 'options-list';

                    let answered = false;

                    Object.entries(exercise.options).forEach(([key, value]) => {
                        const btn = document.createElement('button');
                        btn.className = 'option-btn';

                        const keySpan = document.createElement('span');
                        keySpan.className = 'option-key';
                        keySpan.textContent = key + ')';

                        const textSpan = document.createElement('span');
                        textSpan.textContent = value;

                        btn.appendChild(keySpan);
                        btn.appendChild(textSpan);

                        btn.addEventListener('click', () => {
                            if (answered) return;
                            answered = true;

                            const allBtns = optionsList.querySelectorAll('.option-btn');
                            allBtns.forEach(b => b.disabled = true);

                            if (key === exercise.answer) {
                                btn.classList.add('correct');
                                resultMsg.className = 'result-message correct';
                                resultMsg.textContent = '✓ Correct!';
                                updateStats(true, exercise.number, key);
                            } else {
                                btn.classList.add('wrong');
                                resultMsg.className = 'result-message wrong';
                                const correctText = exercise.options[exercise.answer];
                                resultMsg.textContent = `✗ Incorrect. The correct answer is: ${exercise.answer}) ${correctText}${exercise.explanation ? ' — ' + exercise.explanation : ''}`;

                                allBtns.forEach(b => {
                                    const k = b.querySelector('.option-key').textContent.replace(')', '').trim();
                                    if (k === exercise.answer) {
                                        b.classList.add('correct');
                                    }
                                });
                                updateStats(false, exercise.number, key);
                            }
                        });

                        optionsList.appendChild(btn);
                    });

                    card.appendChild(optionsList);

                } else if (exercise.type === 'fill') {
                    const fillForm = document.createElement('div');
                    fillForm.className = 'fill-form';

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'fill-input';
                    input.placeholder = 'Type your answer...';

                    const submitBtn = document.createElement('button');
                    submitBtn.className = 'fill-submit';
                    submitBtn.textContent = 'Check';

                    fillForm.appendChild(input);
                    fillForm.appendChild(submitBtn);
                    card.appendChild(fillForm);

                    const check = () => {
                        const given = input.value.trim();
                        if (!given) return;
                        input.disabled = true;
                        submitBtn.disabled = true;

                        if (given === exercise.answer) {
                            input.classList.add('correct');
                            resultMsg.className = 'result-message correct';
                            resultMsg.textContent = '✓ Correct!';
                            updateStats(true, exercise.number, given);
                        } else {
                            input.classList.add('wrong');
                            resultMsg.className = 'result-message wrong';
                            resultMsg.textContent = `✗ Incorrect. The correct answer is: ${exercise.answer}${exercise.explanation ? ' — ' + exercise.explanation : ''}`;
                            updateStats(false, exercise.number, given);
                        }
                    };

                    submitBtn.addEventListener('click', check);
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') check();
                    });
                }

                card.appendChild(resultMsg);
                container.appendChild(card);
            });
        }


    </script>
</body>
</html>
