<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step – Greek Tutorial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .page-header {
            max-width: 680px;
            margin: 0 auto 36px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-link {
            text-decoration: none;
            color: #4f46e5;
            font-size: 1.1rem;
            line-height: 1;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #333;
            letter-spacing: 0.02em;
        }

        .blocks-list {
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .block-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            text-decoration: none;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: box-shadow 0.18s, transform 0.18s;
        }

        .block-card:hover {
            box-shadow: 0 4px 16px rgba(79,70,229,0.13);
            transform: translateY(-2px);
        }

        .block-type {
            font-size: 0.75rem;
            font-weight: 600;
            background: #eef2ff;
            color: #4f46e5;
            border-radius: 6px;
            padding: 2px 10px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            flex-shrink: 0;
            margin-right: 16px;
        }

        .block-name {
            font-size: 1rem;
            font-weight: 500;
            flex: 1;
        }

        .block-arrow {
            color: #4f46e5;
            font-size: 1.1rem;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.15rem;
            }

            .block-card {
                padding: 18px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <a class="back-link" href="roadmap.html">←</a>
        <h1 id="stepTitle">Loading…</h1>
    </div>

    <div class="blocks-list" id="blocksList">
        <div class="block-card">
            <span style="color:#888">Loading blocks...</span>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const stepId = params.get('id');

        const stepTitle = document.getElementById('stepTitle');
        const blocksList = document.getElementById('blocksList');

        fetch('../content/roadmap/steps.json')
            .then(r => {
                if (!r.ok) throw new Error();
                return r.json();
            })
            .then(data => {
                const step = (data.steps || []).find(s => s.id === stepId);
                if (!step) {
                    stepTitle.textContent = 'Step not found';
                    blocksList.innerHTML = '<div class="block-card"><span style="color:#888">This step does not exist.</span></div>';
                    return;
                }
                document.title = `${step.title} – Greek Tutorial`;
                stepTitle.textContent = step.title;
                renderBlocks(step.blocks || []);
            })
            .catch(() => {
                stepTitle.textContent = 'Error';
                blocksList.innerHTML = '<div class="block-card"><span style="color:#888">Unable to load step.</span></div>';
            });

        function blockHref(block) {
            if (block.type === 'grammar') {
                return `../grammar/topic.html?id=${encodeURIComponent(block.topic)}`;
            }
            if (block.type === 'vocabulary') {
                return `../vocabulary/block.html?id=${encodeURIComponent(block.topic)}&block=${block.block}`;
            }
            if (block.type === 'reading') {
                return `../reading/item.html?id=${encodeURIComponent(block.topic)}`;
            }
            return '#';
        }

        function blockLabel(block) {
            if (block.type === 'grammar') return block.topic.replace(/_/g, ' ');
            if (block.type === 'vocabulary') return `${block.topic.replace(/_/g, ' ')} · Block ${block.block + 1}`;
            if (block.type === 'reading') return block.topic.replace(/^a\d+_/, '').replace(/_/g, ' ');
            return block.topic || '';
        }

        function renderBlocks(blocks) {
            if (!blocks.length) {
                blocksList.innerHTML = '<div class="block-card"><span style="color:#888">No blocks in this step.</span></div>';
                return;
            }

            blocksList.textContent = '';

            blocks.forEach(block => {
                const link = document.createElement('a');
                link.className = 'block-card';
                link.href = blockHref(block);
                link.innerHTML = `
                    <span class="block-type">${block.type}</span>
                    <span class="block-name">${blockLabel(block)}</span>
                    <span class="block-arrow">→</span>
                `;
                blocksList.appendChild(link);
            });
        }
    </script>
</body>
</html>
