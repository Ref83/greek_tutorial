<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap – Greek Tutorial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .page-header {
            max-width: 680px;
            margin: 0 auto 36px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #333;
            letter-spacing: 0.02em;
        }

        .steps-list {
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .step-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: box-shadow 0.18s, transform 0.18s, opacity 0.3s;
        }

        .step-card:hover {
            box-shadow: 0 4px 16px rgba(79,70,229,0.13);
            transform: translateY(-2px);
        }

        .step-checkbox {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            accent-color: #4f46e5;
            cursor: pointer;
        }

        .step-link {
            flex: 1;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .step-link:hover .step-arrow {
            color: #4f46e5;
        }

        .step-arrow {
            color: #9ca3af;
            font-size: 1.1rem;
            transition: color 0.18s;
        }

        .step-card.completed .step-link {
            color: #9ca3af;
            text-decoration: line-through;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.3rem;
            }

            .step-card {
                padding: 18px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>Roadmap</h1>
    </div>

    <div class="steps-list" id="stepsList">
        <div class="step-card">
            <span style="color:#888">Loading steps...</span>
        </div>
    </div>

    <script>
        const stepsList = document.getElementById('stepsList');

        fetch('../content/roadmap/steps.json')
            .then(r => {
                if (!r.ok) throw new Error();
                return r.json();
            })
            .then(data => renderSteps(data.steps || []))
            .catch(() => {
                stepsList.innerHTML = '<div class="step-card"><span style="color:#888">Unable to load roadmap steps.</span></div>';
            });

        function renderSteps(steps) {
            if (!steps.length) {
                stepsList.innerHTML = '<div class="step-card"><span style="color:#888">No roadmap steps available yet.</span></div>';
                return;
            }

            stepsList.textContent = '';

            steps.forEach((step, index) => {
                const card = document.createElement('div');
                card.className = 'step-card';
                card.dataset.index = index;
                card.dataset.id = step.id;

                const completed = localStorage.getItem(step.id) === 'true';
                if (completed) card.classList.add('completed');

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'step-checkbox';
                checkbox.checked = completed;
                checkbox.addEventListener('change', () => {
                    localStorage.setItem(step.id, checkbox.checked);
                    card.classList.toggle('completed', checkbox.checked);
                    setTimeout(reorder, 300);
                });

                const link = document.createElement('a');
                link.className = 'step-link';
                link.href = `step.html?id=${encodeURIComponent(step.id)}`;
                link.innerHTML = `<span>${step.title}</span><span class="step-arrow">→</span>`;

                card.appendChild(checkbox);
                card.appendChild(link);
                stepsList.appendChild(card);
            });

            reorder();
        }

        function reorder() {
            const cards = [...stepsList.querySelectorAll('.step-card')];
            cards.sort((a, b) => {
                const ac = a.classList.contains('completed');
                const bc = b.classList.contains('completed');
                if (ac !== bc) return ac ? 1 : -1;
                return Number(a.dataset.index) - Number(b.dataset.index);
            });
            cards.forEach(c => stepsList.appendChild(c));
        }
    </script>
</body>
</html>
