<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Read – Greek Tutorial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .top-panel {
            max-width: 680px;
            margin: 0 auto 20px;
            background: #fff;
            border-radius: 12px;
            padding: 16px 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .listen-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            background: #eef2ff;
            color: #4f46e5;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }
        .listen-btn:hover { background: #e0e7ff; }
        .listen-btn.playing { background: #ede9fe; color: #7c3aed; }
        .sentences-list {
            max-width: 680px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .sentence-row {
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
        }
        .sentence-row:last-child { border-bottom: none; }
        .sentence-text {
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 500;
            color: #1a1a1a;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .sentence-row:active .sentence-text,
        .sentence-row.open .sentence-text { background: #f8f7ff; }
        .sentence-translation {
            display: none;
            padding: 0 20px 14px;
            font-size: 0.9rem;
            color: #888;
            background: #f8f7ff;
        }
        .sentence-row.open .sentence-translation { display: block; }
        @media (max-width: 480px) {
            .top-panel { padding: 14px 20px; }
        }
    </style>
</head>
<body>
    <div class="top-panel">
        <button class="listen-btn" id="listenBtn">▶ Listen</button>
    </div>
    <div class="sentences-list" id="sentencesList"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const topicId = params.get('id');
        const blockIndex = parseInt(params.get('block') || '0', 10);
        const blockNum = blockIndex + 1;

        const sentencesList = document.getElementById('sentencesList');

        if (!topicId) {
            sentencesList.innerHTML = '<div style="padding:20px;color:#888;">Invalid topic.</div>';
        } else {
            const audio = new Audio(`../content/vocabulary/${topicId}/story_block_${blockNum}.mp3`);
            const listenBtn = document.getElementById('listenBtn');

            listenBtn.addEventListener('click', () => {
                if (audio.paused) {
                    audio.play();
                    listenBtn.textContent = '⏸ Pause';
                    listenBtn.classList.add('playing');
                } else {
                    audio.pause();
                    listenBtn.textContent = '▶ Listen';
                    listenBtn.classList.remove('playing');
                }
            });

            audio.addEventListener('ended', () => {
                listenBtn.textContent = '▶ Listen';
                listenBtn.classList.remove('playing');
            });

            fetch(`../content/vocabulary/${topicId}/vocabulary.json`)
                .then(r => { if (!r.ok) throw new Error(); return r.json(); })
                .then(data => {
                    const block = (data.blocks || [])[blockIndex];
                    if (!block) return;
                    document.title = `Read – Block ${blockNum} – Greek Tutorial`;

                    const sentences = (block.story && block.story.sentences) || [];

                    if (!sentences.length) {
                        sentencesList.innerHTML = '<div style="padding:20px;color:#888;">No story available.</div>';
                        return;
                    }

                    sentences.forEach(s => {
                        const row = document.createElement('div');
                        row.className = 'sentence-row';

                        const textDiv = document.createElement('div');
                        textDiv.className = 'sentence-text';
                        textDiv.textContent = s.sentence;

                        const translationDiv = document.createElement('div');
                        translationDiv.className = 'sentence-translation';
                        translationDiv.textContent = s.translation;

                        row.appendChild(textDiv);
                        row.appendChild(translationDiv);
                        row.addEventListener('click', () => row.classList.toggle('open'));
                        sentencesList.appendChild(row);
                    });
                })
                .catch(() => {
                    sentencesList.innerHTML = '<div style="padding:20px;color:#888;">Unable to load story.</div>';
                });
        }
    </script>
</body>
</html>
