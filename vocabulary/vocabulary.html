<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary – Greek Tutorial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 36px;
            color: #333;
            letter-spacing: 0.02em;
        }

        .content-card {
            max-width: 680px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            padding: 48px 40px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            text-align: center;
        }

        .placeholder-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .placeholder-text {
            font-size: 1.05rem;
            color: #888;
            line-height: 1.7;
        }

        @media (max-width: 480px) {
            .content-card {
                padding: 36px 24px;
            }

            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <h1>Vocabulary</h1>

    <div class="content-card">
        <div class="placeholder-icon">📝</div>
        <p class="placeholder-text">The content will be delivered soon.</p>
    </div>
</body>
</html>
