<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Topic – Greek Tutorial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .content-card {
            max-width: 680px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            padding: 48px 40px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .content-card h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 16px;
        }

        .content-card p {
            font-size: 0.97rem;
            line-height: 1.7;
            color: #333;
            margin-bottom: 12px;
        }

        .content-card strong {
            color: #1a1a1a;
        }

        .items-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 28px;
        }

        .item-card {
            background: #f9fafb;
            border-radius: 12px;
            padding: 18px 20px;
            border: 1px solid #e5e7eb;
            text-decoration: none;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            transition: box-shadow 0.18s, transform 0.18s, border-color 0.18s;
        }

        .item-card:hover {
            box-shadow: 0 4px 16px rgba(79,70,229,0.13);
            transform: translateY(-2px);
            border-color: #c7d2fe;
        }

        .item-phrase {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.5;
            flex: 1;
            text-align: left;
        }

        .item-arrow {
            color: #4f46e5;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        @media (max-width: 480px) {
            .content-card {
                padding: 32px 20px;
            }

            .content-card h1 {
                font-size: 1.3rem;
            }

            .item-card {
                padding: 16px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="content-card" id="content">
        <h1>Vocabulary Topic</h1>
        <p>Loading topic information...</p>
    </div>

    <script>
        const content = document.getElementById('content');
        const topicId = new URLSearchParams(window.location.search).get('id');

        if (!topicId) {
            renderState('Unknown Topic', 'This page needs a topic id in the URL.');
        } else {
            Promise.all([
                fetch('../content/vocabulary/topics.json').then(handleJsonResponse),
                fetch(`../content/vocabulary/${encodeURIComponent(topicId)}/vocabulary.json`).then(handleJsonResponse)
            ])
                .then(([topicsData, vocabularyData]) => {
                    const topic = Array.isArray(topicsData.topics)
                        ? topicsData.topics.find(item => item.id === topicId)
                        : null;
                    const items = Array.isArray(vocabularyData.items) ? vocabularyData.items : [];

                    if (!topic) {
                        renderState('Topic Not Found', 'The selected vocabulary topic does not exist.');
                        return;
                    }

                    document.title = `${topic.name} – Greek Tutorial`;
                    renderTopic(topic, items);
                })
                .catch(() => {
                    renderState('Topic Not Found', 'The topic data could not be loaded.');
                });
        }

        function handleJsonResponse(response) {
            if (!response.ok) {
                throw new Error(`Unable to load JSON (${response.status})`);
            }
            return response.json();
        }

        function renderTopic(topic, items) {
            content.textContent = '';

            const title = document.createElement('h1');
            title.textContent = topic.name;

            content.appendChild(title);

            if (!items.length) {
                const empty = document.createElement('p');
                empty.textContent = 'No vocabulary items are available for this topic yet.';
                content.appendChild(empty);
                return;
            }

            const list = document.createElement('div');
            list.className = 'items-list';

            items.forEach(item => {
                const link = document.createElement('a');
                link.className = 'item-card';
                link.href = `item.html?topic=${encodeURIComponent(topicId)}&item=${encodeURIComponent(item.id)}`;

                const phrase = document.createElement('span');
                phrase.className = 'item-phrase';
                phrase.textContent = item.phrase || 'Untitled item';

                const arrow = document.createElement('span');
                arrow.className = 'item-arrow';
                arrow.textContent = '→';

                link.appendChild(phrase);
                link.appendChild(arrow);
                list.appendChild(link);
            });

            content.appendChild(list);
        }

        function renderState(title, message) {
            content.textContent = '';

            const titleEl = document.createElement('h1');
            titleEl.textContent = title;

            const messageEl = document.createElement('p');
            messageEl.textContent = message;

            content.appendChild(titleEl);
            content.appendChild(messageEl);
        }
    </script>
</body>
</html>
