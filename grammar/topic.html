<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar Topic – Greek Tutorial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .top-panel {
            max-width: 680px;
            margin: 0 auto 20px;
            background: #fff;
            border-radius: 12px;
            padding: 16px 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .exercises-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #4f46e5;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            background: #eef2ff;
            transition: background 0.15s;
        }

        .exercises-btn:hover {
            background: #e0e7ff;
        }

        .exercises-btn-icon {
            font-size: 1.1rem;
        }

        .drill-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #059669;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            background: #ecfdf5;
            transition: background 0.15s;
        }

        .drill-btn:hover {
            background: #d1fae5;
        }

        .content-card {
            max-width: 680px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            padding: 48px 40px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .content-card h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 24px;
        }

        .content-card h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-top: 32px;
            margin-bottom: 12px;
        }

        .content-card h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #444;
            margin-top: 24px;
            margin-bottom: 8px;
        }

        .content-card p {
            font-size: 0.97rem;
            line-height: 1.7;
            color: #333;
            margin-bottom: 12px;
        }

        .content-card ul {
            padding-left: 20px;
            margin-bottom: 12px;
        }

        .content-card li {
            font-size: 0.97rem;
            line-height: 1.7;
            color: #333;
        }

        .content-card strong {
            color: #1a1a1a;
        }

        @media (max-width: 480px) {
            .content-card {
                padding: 32px 20px;
            }

            .content-card h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="top-panel">
        <a class="exercises-btn" id="exercises-link" href="#">
            <span class="exercises-btn-icon">✏️</span>
            Exercises
        </a>
        <a class="drill-btn" id="drill-link" href="#">
            ⚡ Drill
        </a>
    </div>

    <div class="content-card" id="content"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        document.getElementById('exercises-link').href = `exercises.html?id=${id}`;
        document.getElementById('drill-link').href = `exercises.html?ids=${id}&mode=drill`;
        fetch('../content/grammar/topics.json')
            .then(r => r.json())
            .then(data => {
                const topic = data.topics.find(t => t.id === id);
                if (topic) document.title = topic.name + ' – Greek Tutorial';
            });
        fetch(`../content/grammar/${id}/explanation.md`)
            .then(r => r.text())
            .then(md => {
                document.getElementById('content').innerHTML = marked.parse(md);
            });
    </script>
</body>
</html>
