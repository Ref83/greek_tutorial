<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar Topic – Greek Tutorial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .top-bar {
            max-width: 680px;
            margin: 0 auto 36px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #4f46e5;
            text-decoration: none;
            transition: opacity 0.15s;
        }

        .back-link:hover {
            opacity: 0.75;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 36px;
            color: #333;
            letter-spacing: 0.02em;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a class="back-link" href="grammar.html">← Back</a>
    </div>

    <h1 id="topicTitle"></h1>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        fetch('../content/grammar/topics.json')
            .then(r => r.json())
            .then(data => {
                const topic = data.topics.find(t => t.id === id);
                if (topic) {
                    document.getElementById('topicTitle').textContent = topic.name;
                    document.title = topic.name + ' – Greek Tutorial';
                }
            });
    </script>
</body>
</html>
