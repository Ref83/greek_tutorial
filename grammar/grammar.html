<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar – Greek Tutorial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .page-header {
            max-width: 680px;
            margin: 0 auto 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #333;
            letter-spacing: 0.02em;
        }

        .exercises-top-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #4f46e5;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 8px;
            background: #eef2ff;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }

        .exercises-top-btn:hover {
            background: #e0e7ff;
        }

        .topics-list {
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .topic-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            text-decoration: none;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: box-shadow 0.18s, transform 0.18s;
            cursor: pointer;
        }

        .topic-card:hover {
            box-shadow: 0 4px 16px rgba(79,70,229,0.13);
            transform: translateY(-2px);
        }

        .topic-name {
            font-size: 1rem;
            font-weight: 500;
            flex: 1;
            text-align: left;
        }

        .topic-level {
            font-size: 0.75rem;
            font-weight: 600;
            color: #4f46e5;
            background: #ede9fe;
            border-radius: 6px;
            padding: 2px 10px;
            letter-spacing: 0.04em;
            flex-shrink: 0;
            margin-right: 16px;
        }

        .topic-arrow {
            color: #4f46e5;
            font-size: 1.1rem;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 32px 36px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.18);
        }

        .modal h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #111;
        }

        .modal-subtitle {
            font-size: 0.88rem;
            color: #888;
            margin-bottom: 24px;
        }

        .modal-topics {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
        }

        .modal-topic-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            user-select: none;
        }

        .modal-topic-row:hover {
            border-color: #4f46e5;
            background: #f8f7ff;
        }

        .modal-topic-row.checked {
            border-color: #4f46e5;
            background: #eef2ff;
        }

        .modal-topic-row input[type="checkbox"] {
            width: 17px;
            height: 17px;
            accent-color: #4f46e5;
            flex-shrink: 0;
            cursor: pointer;
        }

        .modal-topic-level {
            font-size: 0.72rem;
            font-weight: 600;
            color: #4f46e5;
            background: #ede9fe;
            border-radius: 5px;
            padding: 1px 8px;
            flex-shrink: 0;
        }

        .modal-topic-name {
            font-size: 0.95rem;
            color: #1a1a1a;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-cancel-btn {
            padding: 9px 20px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            background: #fff;
            color: #555;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .modal-cancel-btn:hover {
            border-color: #aaa;
        }

        .modal-start-btn {
            padding: 9px 24px;
            border: none;
            border-radius: 8px;
            background: #4f46e5;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        .modal-start-btn:hover:not(:disabled) {
            background: #4338ca;
        }

        .modal-start-btn:disabled {
            background: #a5b4fc;
            cursor: default;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.3rem;
            }

            .topic-card {
                padding: 18px 20px;
            }

            .modal {
                padding: 24px 20px;
                margin: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>Grammar</h1>
        <button class="exercises-top-btn" id="openExercisesModal">✏️ Exercises</button>
    </div>

    <div class="topics-list" id="topicsList"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Choose Topics</h2>
            <p class="modal-subtitle">Select one or more topics to practice.</p>
            <div class="modal-topics" id="modalTopics"></div>
            <div class="modal-actions">
                <button class="modal-cancel-btn" id="modalCancel">Cancel</button>
                <button class="modal-start-btn" id="modalStart" disabled>Start</button>
            </div>
        </div>
    </div>

    <script>
        let allTopics = [];

        fetch('../content/grammar/topics.json')
            .then(r => r.json())
            .then(data => {
                allTopics = data.topics;
                const list = document.getElementById('topicsList');
                data.topics.forEach(topic => {
                    const a = document.createElement('a');
                    a.className = 'topic-card';
                    a.href = `topic.html?id=${topic.id}`;
                    a.innerHTML = `<span class="topic-level">${topic.level}</span><span class="topic-name">${topic.name}</span><span class="topic-arrow">→</span>`;
                    list.appendChild(a);
                });
                buildModalTopics(data.topics);
            });

        function buildModalTopics(topics) {
            const container = document.getElementById('modalTopics');
            topics.forEach(topic => {
                const row = document.createElement('label');
                row.className = 'modal-topic-row';

                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = topic.id;

                const levelSpan = document.createElement('span');
                levelSpan.className = 'modal-topic-level';
                levelSpan.textContent = topic.level;

                const nameSpan = document.createElement('span');
                nameSpan.className = 'modal-topic-name';
                nameSpan.textContent = topic.name;

                row.appendChild(cb);
                row.appendChild(levelSpan);
                row.appendChild(nameSpan);

                cb.addEventListener('change', () => {
                    row.classList.toggle('checked', cb.checked);
                    updateStartBtn();
                });

                container.appendChild(row);
            });
        }

        function updateStartBtn() {
            const any = [...document.querySelectorAll('#modalTopics input[type="checkbox"]')].some(cb => cb.checked);
            document.getElementById('modalStart').disabled = !any;
        }

        document.getElementById('openExercisesModal').addEventListener('click', () => {
            document.querySelectorAll('#modalTopics input[type="checkbox"]').forEach(cb => {
                cb.checked = false;
                cb.closest('.modal-topic-row').classList.remove('checked');
            });
            document.getElementById('modalStart').disabled = true;
            document.getElementById('modalOverlay').classList.add('open');
        });

        document.getElementById('modalCancel').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', e => {
            if (e.target === document.getElementById('modalOverlay')) closeModal();
        });

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
        }

        window.addEventListener('pageshow', closeModal);

        document.getElementById('modalStart').addEventListener('click', () => {
            const selected = [...document.querySelectorAll('#modalTopics input[type="checkbox"]')]
                .filter(cb => cb.checked)
                .map(cb => cb.value);
            window.location.href = `exercises.html?ids=${selected.join(',')}`;
        });
    </script>
</body>
</html>
