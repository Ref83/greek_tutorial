<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar – Greek Tutorial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .top-bar {
            max-width: 680px;
            margin: 0 auto 36px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #4f46e5;
            text-decoration: none;
            transition: opacity 0.15s;
        }

        .back-link:hover {
            opacity: 0.75;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 36px;
            color: #333;
            letter-spacing: 0.02em;
        }

        .topics-list {
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .topic-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            text-decoration: none;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: box-shadow 0.18s, transform 0.18s;
            cursor: pointer;
        }

        .topic-card:hover {
            box-shadow: 0 4px 16px rgba(79,70,229,0.13);
            transform: translateY(-2px);
        }

        .topic-name {
            font-size: 1rem;
            font-weight: 500;
        }

        .topic-arrow {
            color: #4f46e5;
            font-size: 1.1rem;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.4rem;
            }

            .topic-card {
                padding: 18px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a class="back-link" href="../index.html">← Back</a>
    </div>

    <h1>Grammar</h1>

    <div class="topics-list" id="topicsList"></div>

    <script>
        fetch('../content/grammar/topics.json')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('topicsList');
                data.topics.forEach(topic => {
                    const a = document.createElement('a');
                    a.className = 'topic-card';
                    a.href = `topic.html?id=${topic.id}`;
                    a.innerHTML = `<span class="topic-name">${topic.name}</span><span class="topic-arrow">→</span>`;
                    list.appendChild(a);
                });
            });
    </script>
</body>
</html>
